    const head = segments[0];
    let moveTimer = 0;
    const MOVE_SPEED = 0.05; 
    let isDrawing = false;

    function moveSnake(dx, dy) {
        // 1. Calculate where the head WOULD go
        let nextX = head.pos.x + dx;
        let nextY = head.pos.y + dy;

        // Apply Screen Wrapping to the "next" coordinates so the check is accurate
        if (nextX < 0) nextX = MAP_WIDTH - TILE_W;
        else if (nextX >= MAP_WIDTH) nextX = 0;
        if (nextY < 0) nextY = MAP_HEIGHT - TILE_H;
        else if (nextY >= MAP_HEIGHT) nextY = 0;

        // 2. Check if any tail segment is already at that "next" position
        // We skip index 0 (the head) and 1 (the segment right behind the head)
        const hitTail = segments.slice(2).some(seg => 
            Math.round(seg.pos.x) === Math.round(nextX) && 
            Math.round(seg.pos.y) === Math.round(nextY)
        );

        if (hitTail) {
            play("hit-tail"); // Play your sound effect
            debug.log("Ouch! You bit your own tongue!");
            return; // EXIT the function early so the monster doesn't move
        }

        // 3. If no collision, proceed with movement
        const currentPosSnapshot = segments.map(seg => ({ x: seg.pos.x, y: seg.pos.y }));
    
        // 1. Move the Head
        head.pos.x += dx;
        head.pos.y += dy;

        // 2. WRAPPING LOGIC (The new part!)
        // Horizontal wrap
        if (head.pos.x < 0) head.pos.x = MAP_WIDTH - TILE_W;
        else if (head.pos.x >= MAP_WIDTH) head.pos.x = 0;

        // Vertical wrap
        if (head.pos.y < 0) head.pos.y = MAP_HEIGHT - TILE_H;
        else if (head.pos.y >= MAP_HEIGHT) head.pos.y = 0;

        // 3. Move the Tail (Your existing loop follows here...)
        for (let i = 1; i < segments.length; i++) {
            const prevPos = currentPosSnapshot[i - 1];
            segments[i].pos.x = prevPos.x;
            segments[i].pos.y = prevPos.y;

            segments[i].width = TILE_W;
            segments[i].height = TILE_H;

            // Use TILE_W/2 to center horizontally, 
            // but 0 for Y to align with the highlight spawn point
            segments[i].offset = vec2(TILE_W / 2, 0); 
        }

        // --- 4. THE EATING LOGIC ---
        const col = Math.round(head.pos.x / TILE_W);
        const row = Math.round(head.pos.y / TILE_H);

        // We check every icon to see if the head is overlapping its 2x2 area
        const target = get("icon").find(icon => {
            const iconCol = Math.round(icon.pos.x / TILE_W);
            const iconRow = Math.round(icon.pos.y / TILE_H);
            
            // Check if monster is within 1 tile of the icon's center
            return Math.abs(col - iconCol) <= 1 && Math.abs(row - iconRow) <= 1;
        });

        if (target) {
        const iconKey = `${Math.round((target.pos.x - TILE_W)/TILE_W)},${Math.round((target.pos.y - TILE_H)/TILE_H)}`;
        const requirement = gameProgress[iconKey];

        if (requirement && underlinedLines.has(requirement.line)) {
            // Save the info we need before destroying
            const eatenText = target.text;
            const eatenY = target.pos.y;
            const eatenX = target.pos.x;
            const isTick = (eatenText === "✔");

            // We check if the vertical position matches the bottom row (Row 44/45)
            // Adding TILE_H accounts for the centering math we did in Section 6
            const isBottomRow = Math.abs(target.pos.y - (44 * TILE_H + TILE_H)) < 10;
            const isRightSide = target.pos.x > (80 * TILE_W); 
            
            const isQuestionSix = isBottomRow && isRightSide;
            
            if (isQuestionSix) {
                play("wow");
                // Wait a tiny fraction of a second so the sound starts 
                // before the monster disappears
                wait(0.1, () => {
                    triggerVictory(); });
            } else {
                play("itemfound"); 
            }
            // ---------------------------

            // 1. Find and destroy BOTH icons for this question
            get("icon").forEach(icon => {
                if (Math.abs(icon.pos.y - eatenY) < 10 && Math.abs(icon.pos.x - eatenX) < 150) {
                    destroy(icon);
                }
            });

            // 2. Re-spawn the correct icon in the "middle"
            // Adjust the X offset to find the center between the original Tick and Cross
            const centerX = isTick ? eatenX + (5 * TILE_W) : eatenX - (5 * TILE_W);
            
            add([
                text(eatenText, { size: eatenText === "✔" ? TILE_H * 2 : TILE_H * 2.5 }),
                pos(centerX, eatenY),
                color(isTick ? rgb(0, 255, 0) : rgb(255, 0, 0)),
                anchor("center"),
                z(50),
                // We don't give this new one the "icon" tag so the monster doesn't eat it again
            ]);

            // 3. True Doubling Growth
            growTongue(segments.length); 

            // 4. Feedback
            add([
                text("YUM!", { size: 14, font: "monospace" }),
                pos(head.pos),
                move(UP, 60),
                lifespan(0.5),
                color(255, 255, 0),
                anchor("center")
            ]);
            
            debug.log("Evidence verified. Tongue doubled!"); 
        } else if (requirement) {
            debug.log(`Get the evidence first!`);
        }
    }
    }

    for (let i = 0; i < amount; i++) {
        const lastSeg = segments[segments.length - 1];
        
        const newSeg = add([
            rect(TILE_W, TILE_H),
            color(180, 0, 0), // Same blood red
            pos(lastSeg.pos.x, lastSeg.pos.y),

}

    onKeyPress("l", () => {
        console.log(`Grid: Col ${Math.round(head.pos.x/TILE_W)}, Row ${Math.round(head.pos.y/TILE_H)}`);})

    onUpdate(() => {
        let dx = 0, dy = 0;

        // 1. MOVEMENT INPUT (Inside onUpdate)
        if (isKeyDown("left")) { 
            dx = -TILE_W; 
            head.flipX = true;  // This flips the sprite so it faces left naturally
            head.angle = 0;     
        }
        else if (isKeyDown("right")) { 
            dx = TILE_W; 
            head.flipX = false; // This resets it to face right
            head.angle = 0; 
        }
        else if (isKeyDown("up")) { 
            dy = -TILE_H; 
            head.flipX = false; 
            head.angle = -90; 
        }
        else if (isKeyDown("down")) { 
            dy = TILE_H; 
            head.flipX = false;
            head.angle = 90; 
        }

        if (dx !== 0 || dy !== 0) {
            moveTimer += dt();
            if (moveTimer >= MOVE_SPEED) {
                moveSnake(dx, dy);
                moveTimer = 0;
            }
        } else {
            moveTimer = MOVE_SPEED;
        }

        if (isDrawing) {
            const currentRow = Math.round(head.pos.y / TILE_H);
            if (currentRow <= 31) {
                underlinedLines.add(currentRow);
                // Inside onUpdate -> HIGHLIGHTER LOGIC
            add([
                rect(TILE_W, TILE_H),
                // Shifted X to align with grid, but Y stays at head.pos.y to match the center
                pos(head.pos.x - (TILE_W / 2), head.pos.y), 
                color(180, 0, 0),
                opacity(0.4),
                z(5),
                "trail"
            ]);
            }
            head.use(sprite("monster-bite")); 
            
        } else {
            head.use(sprite("monster-idle")); 
            
        }
    });

    function triggerVictory() {
    // 1. Stop the game logic by destroying the player segments
    segments.forEach(seg => destroy(seg));

    // 2. Add the BIG monster in the middle of the screen
    // We use MAP_WIDTH and MAP_HEIGHT to find the center
    add([
        sprite("monster-big", { width: TILE_W * 45, height: TILE_H * 30 }),
        pos(MAP_WIDTH / 2, MAP_HEIGHT / 2),
        anchor("center"),
        z(100),
        "victory-content"
    ]);

    // 4. Add the VICTORY text
    add([
        text("VICTORY!", { 
            size: 100, 
            font: "monospace",
            width: 600,
        }),
        pos(MAP_WIDTH / 2, (MAP_HEIGHT / 2) - 300),
        color(255, 105, 180), // Hot Pink
        anchor("center"),
        z(100),
        "victory-content"
    ]);
    }
</script>
